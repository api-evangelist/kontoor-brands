description: Kontoor Brands, Inc. is a global lifestyle apparel company with a portfolio of iconic denim and casual apparel brands including Wrangler, Lee, and Rock & Republic. Headquartered in Greensboro, North Carolina, the company designs, manufactures, sources, markets, and distributes its apparel products worldwide through wholesale, retail, and direct-to-consumer channels. Kontoor Brands does not currently publish a public developer API or documentation portal.
